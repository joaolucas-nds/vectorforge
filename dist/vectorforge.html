<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VectorForge — Procedural Art Generator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,500;1,300&display=swap');

  :root {
    --bg: #0f0f0f;
    --bg2: #161616;
    --bg3: #1e1e1e;
    --bg4: #252525;
    --border: #2a2a2a;
    --border2: #363636;
    --txt: #e8e8e8;
    --txt2: #888;
    --txt3: #555;
    --accent: #c8a96e;
    --accent2: #8b6f3e;
    --gold: #d4a843;
    --panel: 240px;
    --epanel: 170px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--txt); font-family: 'DM Mono', monospace; font-size: 12px; overflow: hidden; }

  /* ── Layout ── */
  .app { display: grid; grid-template-columns: var(--panel) 1fr var(--epanel); grid-template-rows: 44px 1fr; height: 100vh; }
  .topbar { grid-column: 1/-1; display: flex; align-items: center; gap: 10px; padding: 0 16px; border-bottom: 1px solid var(--border); background: var(--bg2); }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-hex { width: 22px; height: 22px; }
  .logo-title { font-family: 'Fraunces', serif; font-size: 15px; font-weight: 500; color: var(--accent); letter-spacing: 0.04em; }
  .logo-sub { font-size: 9px; color: var(--txt3); letter-spacing: 0.12em; text-transform: uppercase; }
  .tb-sep { width: 1px; height: 20px; background: var(--border2); margin: 0 4px; }
  .tb-status { margin-left: auto; font-size: 10px; color: var(--txt3); }
  .tb-status span { color: var(--accent); }
  .tb-btn { background: none; border: 1px solid var(--border2); color: var(--txt2); padding: 4px 10px; border-radius: 4px; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.05em; }
  .tb-btn:hover { border-color: var(--accent2); color: var(--accent); }

  /* ── Panels ── */
  .left-panel { border-right: 1px solid var(--border); background: var(--bg2); overflow-y: auto; display: flex; flex-direction: column; gap: 0; }
  .right-panel { border-left: 1px solid var(--border); background: var(--bg2); overflow-y: auto; display: flex; flex-direction: column; gap: 0; }
  .canvas-area { background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; overflow: hidden; position: relative; }

  .section { border-bottom: 1px solid var(--border); padding: 10px 12px; }
  .sec-label { font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--txt3); margin-bottom: 8px; }

  /* ── Style tiles ── */
  .style-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; }
  .stile { background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; padding: 8px 4px 6px; cursor: pointer; text-align: center; transition: all .15s; }
  .stile:hover { border-color: var(--border2); background: var(--bg4); }
  .stile.active { border-color: var(--accent); background: #1c1810; }
  .stile-ico { width: 32px; height: 32px; margin: 0 auto 4px; display: block; }
  .stile-name { font-size: 8.5px; color: var(--txt2); letter-spacing: 0.04em; }
  .stile.active .stile-name { color: var(--accent); }

  /* ── Type chips ── */
  .type-wrap { display: flex; flex-wrap: wrap; gap: 4px; }
  .tchip { font-size: 9px; padding: 3px 8px; border: 1px solid var(--border2); border-radius: 99px; cursor: pointer; color: var(--txt3); background: var(--bg3); transition: all .12s; }
  .tchip:hover { color: var(--txt); border-color: var(--txt3); }
  .tchip.active { background: var(--accent); border-color: var(--accent); color: #0f0f0f; }

  /* ── Sliders ── */
  .slider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .slider-row label { font-size: 9px; color: var(--txt3); width: 72px; flex-shrink: 0; letter-spacing: 0.04em; }
  .slider-row input[type=range] { flex: 1; -webkit-appearance: none; appearance: none; height: 2px; background: var(--border2); border-radius: 2px; outline: none; }
  .slider-row input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; background: var(--accent); border-radius: 50%; cursor: pointer; }
  .slider-row input[type=range]::-webkit-slider-thumb:hover { background: var(--gold); }
  .sv { font-size: 9px; color: var(--txt2); min-width: 26px; text-align: right; }

  /* ── Color palettes ── */
  .pal-row { display: flex; gap: 5px; flex-wrap: wrap; }
  .pal-swatch { width: 16px; height: 16px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; flex-shrink: 0; }
  .pal-swatch.active { border-color: var(--txt); }

  /* ── Canvas ── */
  .cv-wrap { position: relative; }
  .cv-shadow { box-shadow: 0 8px 48px rgba(0,0,0,.7); }
  #main-svg { display: block; }
  .cv-bar { display: flex; gap: 2px; background: var(--bg2); border: 1px solid var(--border); border-radius: 99px; padding: 4px; }
  .cvb { width: 26px; height: 26px; background: none; border: none; color: var(--txt3); cursor: pointer; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; transition: all .12s; }
  .cvb:hover { color: var(--txt); background: var(--bg4); }
  .cvb.active { color: var(--accent); }
  .cvb-txt { width: auto; padding: 0 8px; font-size: 9px; font-family: 'DM Mono', monospace; border-radius: 99px; }

  /* ── Canvas size ── */
  .size-row { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
  .sz-inp { width: 54px; font-size: 9px; background: var(--bg3); border: 1px solid var(--border); color: var(--txt); padding: 4px 6px; border-radius: 4px; font-family: 'DM Mono', monospace; }
  .sz-inp:focus { outline: none; border-color: var(--accent2); }
  .sz-pre { font-size: 8px; padding: 3px 6px; background: var(--bg3); border: 1px solid var(--border); color: var(--txt3); border-radius: 4px; cursor: pointer; font-family: 'DM Mono', monospace; }
  .sz-pre:hover { border-color: var(--border2); color: var(--txt); }

  /* ── Text input for text-to-vector ── */
  .tv-ta { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--txt); padding: 7px 8px; border-radius: 5px; font-family: 'DM Mono', monospace; font-size: 10px; resize: none; height: 52px; }
  .tv-ta:focus { outline: none; border-color: var(--accent2); }
  .font-chips { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 5px; }
  .font-chip { font-size: 8px; padding: 2px 6px; border: 1px solid var(--border); border-radius: 3px; cursor: pointer; color: var(--txt3); background: var(--bg3); }
  .font-chip:hover { color: var(--txt); }
  .font-chip.active { border-color: var(--accent); color: var(--accent); }

  /* ── Generate button ── */
  .gen-btn { width: 100%; padding: 10px; font-size: 11px; font-weight: 500; cursor: pointer; border-radius: 6px; background: var(--accent); color: #0f0f0f; border: none; font-family: 'DM Mono', monospace; letter-spacing: 0.06em; text-transform: uppercase; transition: all .15s; }
  .gen-btn:hover { background: var(--gold); }
  .gen-btn:active { transform: scale(.98); }
  .gen-btn:disabled { opacity: .4; cursor: default; }

  /* ── Export panel ── */
  .xbtn { width: 100%; padding: 7px 10px; font-size: 10px; cursor: pointer; border-radius: 5px; display: flex; align-items: center; justify-content: center; gap: 6px; font-family: 'DM Mono', monospace; transition: all .12s; margin-bottom: 5px; }
  .xbtn-p { background: var(--accent); color: #0f0f0f; border: none; }
  .xbtn-p:hover { background: var(--gold); }
  .xbtn-s { background: var(--bg3); border: 1px solid var(--border2); color: var(--txt2); }
  .xbtn-s:hover { border-color: var(--accent2); color: var(--accent); }

  /* ── Variations ── */
  .var-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; }
  .vthumb { border: 1px solid var(--border); border-radius: 5px; aspect-ratio: 1; overflow: hidden; cursor: pointer; background: #fff; display: flex; align-items: center; justify-content: center; }
  .vthumb:hover { border-color: var(--border2); }
  .vthumb.active { border: 1.5px solid var(--accent); }
  .vthumb svg { width: 100%; height: 100%; }

  /* ── Info ── */
  .info-box { font-size: 9px; color: var(--txt3); line-height: 1.9; }
  .info-box b { color: var(--txt2); font-weight: 500; }

  /* ── Canvas grid overlay ── */
  .grid-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0; transition: opacity .2s; }
  .grid-svg.visible { opacity: .35; }

  /* ── Pixel art canvas ── */
  #px-canvas { display: none; image-rendering: pixelated; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .mode-bar { display: flex; gap: 4px; }
  .mode-btn { font-size: 9px; padding: 3px 9px; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; background: var(--bg3); color: var(--txt3); font-family: 'DM Mono', monospace; }
  .mode-btn.active { border-color: var(--accent); color: var(--accent); background: #1c1810; }

  .tag { font-size: 8px; padding: 1px 5px; border-radius: 3px; background: var(--bg4); border: 1px solid var(--border); color: var(--txt3); }

</style>
</head>
<body>
<div class="app">

  <!-- ── Top bar ── -->
  <header class="topbar">
    <div class="logo">
      <svg class="logo-hex" viewBox="0 0 22 22" fill="none">
        <polygon points="11,2 20,6.5 20,15.5 11,20 2,15.5 2,6.5" fill="none" stroke="#c8a96e" stroke-width="1"/>
        <polygon points="11,5 17,8.5 17,13.5 11,17 5,13.5 5,8.5" fill="#c8a96e20"/>
        <circle cx="11" cy="11" r="2" fill="#c8a96e"/>
      </svg>
      <span class="logo-title">VectorForge</span>
      <span class="logo-sub">Procedural</span>
    </div>
    <div class="tb-sep"></div>
    <div class="mode-bar">
      <button class="mode-btn active" id="mb-vec" onclick="setMode('vector')">Vector SVG</button>
      <button class="mode-btn" id="mb-px" onclick="setMode('pixel')">Pixel Art</button>
    </div>
    <div class="tb-sep"></div>
    <span class="tag" id="dim-tag">400 × 400</span>
    <div class="tb-status" id="tb-status"><span>Ready</span></div>
    <button class="tb-btn" onclick="doGenRandom()">↻ Regenerate</button>
  </header>

  <!-- ── Left Panel ── -->
  <aside class="left-panel">

    <div class="section">
      <div class="sec-label">Art Style</div>
      <div class="style-grid" id="style-grid"></div>
    </div>

    <div class="section">
      <div class="sec-label">Output Type</div>
      <div class="type-wrap" id="type-wrap"></div>
    </div>

    <div class="section">
      <div class="sec-label">Parameters</div>
      <div class="slider-row"><label>Complexity</label><input type="range" id="s-comp" min="0" max="100" value="55" step="1"><span class="sv" id="sv-comp">55</span></div>
      <div class="slider-row"><label>Symmetry</label><input type="range" id="s-sym" min="0" max="100" value="50" step="1"><span class="sv" id="sv-sym">50</span></div>
      <div class="slider-row"><label>Stroke w.</label><input type="range" id="s-sw" min="2" max="36" value="12" step="1"><span class="sv" id="sv-sw">1.2</span></div>
      <div class="slider-row"><label>Fill opac.</label><input type="range" id="s-fill" min="0" max="100" value="0" step="1"><span class="sv" id="sv-fill">0%</span></div>
      <div class="slider-row"><label>Seed</label><input type="range" id="s-seed" min="1" max="999" value="42" step="1"><span class="sv" id="sv-seed">42</span></div>
    </div>

    <div class="section">
      <div class="sec-label">Canvas Size</div>
      <div class="size-row">
        <input type="number" id="cw" class="sz-inp" value="400" min="50" max="3000">
        <span style="color:var(--txt3);font-size:10px">×</span>
        <input type="number" id="ch" class="sz-inp" value="400" min="50" max="3000">
      </div>
      <div class="size-row" style="margin-top:5px">
        <button class="sz-pre" onclick="setRatio(1,1)">1:1</button>
        <button class="sz-pre" onclick="setRatio(4,3)">4:3</button>
        <button class="sz-pre" onclick="setRatio(16,9)">16:9</button>
        <button class="sz-pre" onclick="setRatio(3,4)">3:4</button>
        <button class="sz-pre" onclick="setRatio(210,297)">A4</button>
      </div>
    </div>

    <div class="section">
      <div class="sec-label">Color Theme</div>
      <div class="pal-row" id="pal-row"></div>
    </div>

    <div class="section" id="text-section">
      <div class="sec-label">Text → Form <span style="color:var(--txt3);font-weight:400;text-transform:none;letter-spacing:0">(type to shape)</span></div>
      <textarea class="tv-ta" id="tv-ta" maxlength="64" placeholder="ex: AURA, ☽, OM..."></textarea>
      <div class="font-chips" id="font-chips"></div>
    </div>

    <div class="section" style="border-bottom:none; flex:1; display:flex; flex-direction:column; justify-content:flex-end; padding-bottom:14px;">
      <button class="gen-btn" id="gen-btn" onclick="doGen()">Generate</button>
    </div>
  </aside>

  <!-- ── Canvas ── -->
  <main class="canvas-area" id="canvas-area">
    <div class="cv-wrap" id="cv-wrap">
      <div class="cv-shadow" id="svg-holder">
        <svg id="main-svg" xmlns="http://www.w3.org/2000/svg" width="340" height="340" viewBox="0 0 400 400">
          <rect width="400" height="400" fill="#ffffff"/>
          <text x="200" y="200" text-anchor="middle" dominant-baseline="middle"
            font-family="DM Mono,monospace" font-size="11" fill="#bbb">Click Generate</text>
        </svg>
        <canvas id="px-canvas" width="64" height="64"></canvas>
      </div>
      <svg class="grid-svg" id="grid-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div class="cv-bar">
      <button class="cvb" onclick="zoom(-0.25)" title="Zoom out">−</button>
      <button class="cvb cvb-txt" onclick="zoom(0)" title="Fit">Fit</button>
      <button class="cvb" onclick="zoom(0.25)" title="Zoom in">+</button>
      <span style="width:1px;height:16px;background:var(--border);margin:5px 2px"></span>
      <button class="cvb" id="btn-bg" onclick="toggleBg()" title="Toggle background">◐</button>
      <button class="cvb" id="btn-grid" onclick="toggleGrid()" title="Grid">⊞</button>
      <button class="cvb" id="btn-draw" onclick="toggleDraw()" title="Draw mode">✏</button>
    </div>
  </main>

  <!-- ── Right Panel (Export) ── -->
  <aside class="right-panel">
    <div class="section">
      <div class="sec-label">Export</div>
      <button class="xbtn xbtn-p" onclick="xSVG()">↓ SVG</button>
      <button class="xbtn xbtn-s" onclick="xPNG()">↓ PNG</button>
      <button class="xbtn xbtn-s" onclick="copySVG()">⎘ Copy SVG</button>
    </div>

    <div class="section">
      <div class="sec-label">Variations</div>
      <div class="var-grid" id="var-grid">
        <div class="vthumb active" id="vt0" onclick="applyVar(0)"></div>
        <div class="vthumb" id="vt1" onclick="applyVar(1)"></div>
        <div class="vthumb" id="vt2" onclick="applyVar(2)"></div>
        <div class="vthumb" id="vt3" onclick="applyVar(3)"></div>
      </div>
    </div>

    <div class="section" style="border-bottom:none;flex:1">
      <div class="sec-label">Info</div>
      <div class="info-box" id="info-box">—</div>
    </div>
  </aside>

</div>
